# Local development defaults. Production secrets should come from environment
# variables or a secrets manager.

spring.application.name=nubian-ai-java
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:7070}
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true

# Valid values: local, staging, production

# Nubian starter and module flags

# Sandbox defaults target the Docker computer provider. Override with local for
# host-only development.
nubian.sandbox.provider=${NUBIAN_SANDBOX_PROVIDER:docker-cli}
nubian.sandbox.local.enabled=true
nubian.sandbox.docker.enabled=${NUBIAN_SANDBOX_DOCKER_ENABLED:true}
nubian.sandbox.docker.binary=${DOCKER_BINARY:docker}
nubian.sandbox.daytona.enabled=false
nubian.sandbox.firecracker.enabled=${NUBIAN_SANDBOX_FIRECRACKER_ENABLED:false}
nubian.sandbox.firecracker.api-base-url=${NUBIAN_FLYVM_API_BASE:https://api.flyvm.io}
nubian.sandbox.firecracker.direct-no-vnc-url=${NUBIAN_FLYVM_DIRECT_NOVNC_URL:}
nubian.sandbox.firecracker.static-vm-id=${NUBIAN_FLYVM_STATIC_VM_ID:}
nubian.sandbox.firecracker.api-key=${FLYVM_API_KEY:}
nubian.sandbox.firecracker.bearer-token=${FLYVM_TOKEN:}
nubian.sandbox.firecracker.jwt-secret=${FLYVM_JWT_SECRET:}
nubian.sandbox.firecracker.jwt-issuer=${FLYVM_JWT_ISSUER:flyvm-auth-service}
nubian.sandbox.firecracker.jwt-audience=${FLYVM_JWT_AUDIENCE:flyvm-api}
nubian.sandbox.firecracker.jwt-tenant-id=${FLYVM_TENANT_ID:}
nubian.sandbox.firecracker.jwt-tier=${FLYVM_JWT_TIER:enterprise}
nubian.sandbox.firecracker.jwt-query-limit=${FLYVM_JWT_QUERY_LIMIT:1000000}
nubian.sandbox.firecracker.jwt-ttl=${FLYVM_JWT_TTL:1h}
nubian.sandbox.firecracker.region=${NUBIAN_FLYVM_REGION:}
nubian.sandbox.firecracker.required-provider=${NUBIAN_FLYVM_REQUIRED_PROVIDER:}
nubian.sandbox.firecracker.repair-no-vnc-proxy=${NUBIAN_FLYVM_REPAIR_NOVNC:false}
nubian.sandbox.persistence.sqlite.enabled=false
nubian.sandbox.persistence.sqlite.path=${NUBIAN_SANDBOX_SQLITE_PATH:${java.io.tmpdir}/nubian-sandbox.sqlite}
nubian.sandbox.tools.auto-register=true
nubian.sandbox.tools.auto-registration-enabled=true
nubian.sandbox.tools.invocation-timeout-seconds=900
nubian.sandbox.security.enabled=true
nubian.sandbox.security.allow-privileged-docker=false
nubian.sandbox.security.allow-public-ports=true
nubian.sandbox.security.max-command-timeout-seconds=0

# Optional Daytona provider settings
DAYTONA_API_KEY=
DAYTONA_SERVER_URL=
DAYTONA_TARGET=

# Runtime persistence
SUPABASE_URL=
SUPABASE_ANON_KEY=
SUPABASE_SERVICE_ROLE_KEY=
SUPABASE_SCHEMA=public

# JWT is only required when nubian.agent.identity-security.enabled=true.

# Redis
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=
REDIS_SSL=false
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}
spring.redis.password=${REDIS_PASSWORD}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# RabbitMQ
RABBITMQ_HOST=localhost
RABBITMQ_PORT=5672
RABBITMQ_USERNAME=guest
RABBITMQ_PASSWORD=guest
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.connection.retry.initial-interval=1000
spring.rabbitmq.connection.retry.max-interval=30000
spring.rabbitmq.connection.retry.multiplier=2.0
spring.rabbitmq.connection.retry.max-attempts=5

# Agent defaults
nubian.agent.max-steps=${NUBIAN_AGENT_MAX_STEPS:80}
nubian.agent.doom-threshold=${NUBIAN_AGENT_DOOM_THRESHOLD:4}

# LLM provider configuration
OPENROUTER_API_KEY=
OPENROUTER_MODEL=
OPENAI_API_KEY=
spring.ai.openai.api-key=${OPENAI_API_KEY:${OPENROUTER_API_KEY:}}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
nubian.llm.base-url=${NUBIAN_LLM_BASE_URL:https://openrouter.ai/api/v1}
nubian.llm.api-key=${NUBIAN_LLM_API_KEY:${OPENROUTER_API_KEY:}}
nubian.llm.text-model=${NUBIAN_LLM_TEXT_MODEL:google/gemini-2.5-flash-lite}
nubian.llm.vision-model=${NUBIAN_LLM_VISION_MODEL:google/gemini-2.5-flash-lite}
nubian.llm.text.model=${NUBIAN_LLM_TEXT_MODEL:google/gemini-2.5-flash-lite}
nubian.llm.vision.model=${NUBIAN_LLM_VISION_MODEL:google/gemini-2.5-flash-lite}
nubian.llm.reasoning.max-tokens=${NUBIAN_LLM_REASONING_MAX_TOKENS:8192}

# Default every Gemini role to Flash Lite for cost. UGround remains separate.
nubian.agent.planner-model=${NUBIAN_AGENT_PLANNER_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.seeact.model=${NUBIAN_AGENT_SEEACT_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.pro-actor.model=${NUBIAN_AGENT_PRO_ACTOR_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.checkpoint-verifier-model=${NUBIAN_AGENT_CHECKPOINT_VERIFIER_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.summarizer-model=${NUBIAN_AGENT_SUMMARIZER_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.grounding-model=${NUBIAN_AGENT_GROUNDING_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.expert.model=${NUBIAN_AGENT_EXPERT_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.seeker-model=${NUBIAN_AGENT_SEEKER_MODEL:google/gemini-2.5-flash-lite}
nubian.agent.seeker-enabled=${NUBIAN_AGENT_SEEKER_ENABLED:false}

# OmniParser + UGround default ON. Points at the current one-port GPU stack.
# Override via env vars when running against a different sidecar/grounder.
nubian.agent.omniparser.url=${NUBIAN_OMNIPARSER_URL:http://localhost:16544}
nubian.uground.enabled=${NUBIAN_UGROUND_ENABLED:true}
nubian.uground.base-url=${NUBIAN_UGROUND_BASE_URL:http://localhost:20228/v1}
nubian.uground.model=${NUBIAN_UGROUND_MODEL:ByteDance-Seed/UI-TARS-1.5-7B}
nubian.uground.resize-target=${NUBIAN_UGROUND_RESIZE_TARGET:0}
nubian.uground.vote-mode=${NUBIAN_UGROUND_VOTE_MODE:false}

# Context management

# Logging
logging.level.root=INFO
logging.level.com.nubian.ai=INFO

# Firebase and Google Cloud
FIREBASE_PROJECT_ID=
FIREBASE_PRIVATE_KEY_ID=
FIREBASE_CLIENT_EMAIL=
FIREBASE_CLIENT_ID=
GCP_PROJECT_ID=
GOOGLE_CLOUD_PROJECT=

# Search and retrieval APIs
TAVILY_API_KEY=
RAPID_API_KEY=
FIRECRAWL_API_KEY=
FIRECRAWL_URL=
JINA_API_KEY=

# Vector databases
QDRANT_URL=
QDRANT_API_KEY=
QDRANT_COLLECTION_NAME=
PINECONE_API_KEY=

# Additional AI API keys
ANTHROPIC_API_KEY=
GROQ_API_KEY=

# ---------------------------------------------------------------------------
# Chrome DevTools MCP server (opt-in)
# ---------------------------------------------------------------------------
# Enable the 'mcp' Spring profile to start the chrome-devtools-mcp stdio server
# automatically and expose its tools (navigate_page, evaluate_script,
# take_snapshot, …) to the agent via AgentToolRegistry.
#
# Dev: add 'mcp' to the active profiles:
#   spring.profiles.active=dev,mcp
#
# Or pass the system property at startup:
#   java -Dspring.profiles.active=mcp -jar nubian-app.jar
#
# See: nubian-app/src/main/resources/application-mcp.properties
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Universal computer-agent provider — Eyes/Hands/Shell/Memory/Viewer/Browser
# contract against any Ubuntu desktop guest (OSWorld, FlyVM-Ubuntu,
# Docker-Ubuntu, KVM, bare). Enabling registers providerId=computer-agent
# alongside firecracker; pick it at runtime via /demo/computer?provider=computer-agent.
# ---------------------------------------------------------------------------
nubian.sandbox.computer-agent.enabled=true

# Android emulator agent (REST shim over adb)
nubian.sandbox.android.enabled=${NUBIAN_SANDBOX_ANDROID_ENABLED:true}
nubian.sandbox.android.host=${NUBIAN_ANDROID_HOST:localhost}
nubian.sandbox.android.port=${NUBIAN_ANDROID_PORT:28007}
nubian.sandbox.android.novnc-url=${NUBIAN_ANDROID_NOVNC_URL:http://localhost:28008/vnc.html?host=localhost&port=28008&autoconnect=true&resize=scale}
nubian.sandbox.computer-agent.host=localhost
nubian.sandbox.computer-agent.agent-port=28006
nubian.sandbox.computer-agent.base-path=/agent
nubian.sandbox.base-url=http://${nubian.sandbox.computer-agent.host}:${nubian.sandbox.computer-agent.agent-port}${nubian.sandbox.computer-agent.base-path}
nubian.sandbox.computer-agent.vnc-port=5900
nubian.sandbox.computer-agent.novnc-port=28006
nubian.sandbox.computer-agent.cdp-port=9222

# ---------------------------------------------------------------------------
# Mind base system prompt. Encourages human-like desktop interaction over
# shell shortcuts when graphical tools are available.
# ---------------------------------------------------------------------------
You see the screen through screenshots and act through human-style controls: \
clicks, double-clicks, right-clicks, typing, key combinations, and scrolling. \
\n\nGuiding principles: \
\n  1. Think like a person sitting in front of the screen. To open a website, \
do what a person would: take a screenshot to find the browser icon, double-click \
it, click the address bar (or press Ctrl+L), type the URL, press Enter, then \
take another screenshot to confirm the page loaded. \
\n  2. Prefer GUI actions (screenshot, click, type_text, key, scroll) over shell \
shortcuts. Do not use curl/wget/grep to scrape pages when a real browser is \
available — that is non-human behaviour and bypasses the task. \
\n  3. Use shell exec ONLY when there is a clear non-GUI need: making a \
directory, moving a file, running a build script, etc. Even then, prefer the \
file tools (read_file, write_file, list_files) for plain file work. \
\n  4. After every meaningful action, take a fresh screenshot before deciding \
the next step. The screen is your ground truth, not your assumptions. \
\n  5. When the task is complete and verified, call done() with a short summary.
