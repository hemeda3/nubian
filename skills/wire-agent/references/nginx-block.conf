# The exact location block that patch-nginx.sh injects into
# /etc/nginx/sites-enabled/web.conf inside the OSWorld container.
#
# Place it INSIDE the existing server { ... } block, after the existing
# noVNC location entries.

location = /agent { return 301 /agent/; }

location /agent/ {
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_pass http://20.20.20.21:6090/;
}

# Notes:
# - 20.20.20.21 is the guest VM IP in happysixd/osworld-docker's
#   dockerbridge subnet 20.20.20.0/24. Don't change this unless you have
#   rebuilt the container with a different network config.
# - proxy_buffering off is needed so /eyes/screenshot streaming PNG bytes
#   work in real time.
# - The long read/send timeouts are for slow planner calls that may take
#   minutes when chained with the supervisor.
